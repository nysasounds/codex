name: Auto-approve Renovate PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

jobs:
  approve:
    runs-on: ubuntu-latest
    # Only run this job if the PR author is the Renovate bot
    if: github.actor == 'renovate[bot]'
    permissions:
      pull-requests: write # Required to submit the approval
    steps:
      - name: Approve PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --approve -b "Auto-approved by GitHub Actions to allow Renovate auto-merge"
